<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="#1B2B4B"/>

  <!-- Subtle inner glow ring -->
  <rect x="24" y="24" width="464" height="464" rx="76" ry="76" fill="none" stroke="#2D4470" stroke-width="2"/>

  <!-- Monogram "I" serif letterform -->
  <!-- Top serif bar -->
  <rect x="164" y="132" width="184" height="40" rx="8" ry="8" fill="#F5F0E8"/>
  <!-- Stem -->
  <rect x="228" y="172" width="56" height="168" rx="0" fill="#F5F0E8"/>
  <!-- Bottom serif bar -->
  <rect x="164" y="340" width="184" height="40" rx="8" ry="8" fill="#F5F0E8"/>

  <!-- Green dollar accent line through the I -->
  <rect x="228" y="236" width="56" height="16" rx="4" fill="#2A7D4F"/>

  <!-- Decorative dots -->
  <circle cx="168" cy="420" r="8" fill="#2A7D4F" opacity="0.6"/>
  <circle cx="256" cy="420" r="8" fill="#2A7D4F" opacity="0.8"/>
  <circle cx="344" cy="420" r="8" fill="#2A7D4F" opacity="0.6"/>
</svg>
