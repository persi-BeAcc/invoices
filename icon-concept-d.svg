  <rect x="148" y="220" width="120" height="10" rx="5" fill="#CCC7BE"/>
  <rect x="148" y="242" width="176" height="8" rx="4" fill="#D9D4CC"/>
  <rect x="148" y="260" width="152" height="8" rx="4" fill="#D9D4CC"/>

  <!-- Divider -->
  <rect x="148" y="284" width="200" height="2" rx="1" fill="#D9D4CC"/>

  <!-- Amount block -->
  <rect x="148" y="298" width="60" height="11" rx="5.5" fill="#CCC7BE"/>
  <rect x="264" y="296" width="84" height="15" rx="7.5" fill="#2A7D4F"/>

  <!-- Bottom lines -->
  <rect x="148" y="330" width="140" height="8" rx="4" fill="#E2DDD6"/>
