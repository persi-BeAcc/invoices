  <!-- Corner fold shadow line -->
  <line x1="312" y1="80" x2="312" y2="140" stroke="#B0A898" stroke-width="2"/>
  <line x1="312" y1="140" x2="372" y2="140" stroke="#B0A898" stroke-width="2"/>

  <!-- Green accent stripe at top of document content area -->
