  <!-- Document lines on the right (decorative) -->
  <rect x="148" y="376" width="200" height="2" rx="1" fill="#E2DDD6"/>
  <rect x="148" y="392" width="160" height="2" rx="1" fill="#E2DDD6"/>
  <rect x="148" y="408" width="120" height="2" rx="1" fill="#E2DDD6"/>
